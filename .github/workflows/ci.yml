name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  schema-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --no-cache-dir pytest ruff -e apps/gradio
      - name: Run schema and service tests
        run: pytest -q -m "not phase5"
      - name: Run Phase 5 legacy CSV regression
        run: pytest -q -m phase5
      - name: Run lint
        run: ruff check .

  engine-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/pyhees-jjj
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --no-cache-dir pytest -e .
      - name: Run calculation engine tests
        run: python -m pytest src/tests -q -o addopts=""
